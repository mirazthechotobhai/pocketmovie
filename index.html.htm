<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pocket Movie - Watch Movies, TV Shows &amp; Anime</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#262626;color:#fff;font-family:'Poppins',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}img{max-width:100%;vertical-align:middle;border:0}ul{list-style:none}button{font-family:'Poppins',sans-serif;cursor:pointer}
::-webkit-scrollbar{width:3px;height:8px}::-webkit-scrollbar-track{background:rgba(0,0,0,.1)}::-webkit-scrollbar-thumb{border-radius:10px;background:#f00}
/* TOPBAR */
.topbar-wrapper{background:linear-gradient(180deg,#262626,#f00,#262626);position:sticky;top:0;z-index:200;border-bottom:1px solid #262626}
.top-inner{display:flex;align-items:center;justify-content:space-between;width:100%;height:42px;padding:0 24px}
.breakhead{color:#fff;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:0 12px;background:#f00;height:42px;white-space:nowrap;flex-shrink:0}
.ticker-wrap{overflow:hidden;flex:1;min-width:0;height:42px;display:flex;align-items:center;padding:0 16px 0 5px}
.ticker-item{display:flex;align-items:center;gap:14px;animation:tickUp 4.2s ease forwards}
.ticker-rank{font-size:9px;font-weight:800;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(10px);border-radius:5px;padding:2px 6px;flex-shrink:0;letter-spacing:.6px}
.ticker-title{font-size:10px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:85px}
@keyframes tickUp{0%{opacity:0;transform:translateY(8px)}12%{opacity:1;transform:translateY(0)}75%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-8px)}}
.social-icons{display:flex;align-items:center;gap:8px}
.social-icons a{color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .25s;border:1px solid rgba(255,255,255,.18)}
.social-icons a:hover{background:rgba(255,255,255,.22);color:#fff;transform:scale(1.12)}
/* HEADER */
#main-header{background:linear-gradient(90deg,#262626,#f00,#262626);border-bottom:1px solid #262626;position:sticky;top:42px;z-index:199}
.header-wrapper{width:100%;height:85px;padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}
.logo-text{font-size:24px;font-weight:800;color:#fff;cursor:pointer;user-select:none;display:flex;align-items:center;height:85px}
.logo-inner{display:inline-flex;align-items:baseline;gap:0;line-height:1}
.logo-img{height:.78em;width:auto;border-radius:2px;position:relative;top:.06em}
.logo-tld{font-size:10px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.2px;margin-left:1px}
.menu-nav{display:flex;align-items:center;height:85px;gap:6px}
.menu-nav li{list-style:none}
.menu-nav li a{display:flex;align-items:center;justify-content:center;padding:.45em 1.3em;color:rgba(255,255,255,.65);background:#262626;cursor:pointer;border-radius:8px;text-transform:uppercase;font-weight:700;letter-spacing:.5px;font-size:11px;white-space:nowrap;text-decoration:none;transition:color .2s;border:none;box-shadow:0 4px 10px rgba(0,0,0,.5)}
.menu-nav li a:hover{color:#fff;background:#333}
.menu-nav li a.active{background:#262626;animation:nav-color-cycle 4s linear infinite}
@keyframes nav-color-cycle{0%{color:#f55}14%{color:#fa4}28%{color:#ff4}42%{color:#5f5}57%{color:#4fe}71%{color:#59f}85%{color:#b5f}100%{color:#f55}}
.search-box{position:relative;display:flex;align-items:center}
.search-input{background:linear-gradient(50deg,rgba(39,0,255,0),#222);height:40px;padding:0 110px 0 18px;color:#fff;transition:all .55s;border-radius:60px;border:1.5px solid #fff;font-family:'Poppins',sans-serif;font-size:13px;width:280px;outline:none}
.search-input:focus{background:#fff;color:#333;width:340px}
.search-input::placeholder{color:rgba(255,255,255,.7)}.search-input:focus::placeholder{color:#999}
.search-actions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:2px}.search-btn{background:transparent;border:none;cursor:pointer;color:#f00;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}.search-btn:hover{background:rgba(255,0,0,.15)}.voice-search-btn{background:transparent;border:none;cursor:pointer;color:rgba(255,255,255,.7);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}.voice-search-btn:hover{color:#fff;background:rgba(255,255,255,.12)}.voice-search-btn.listening{color:#f00;animation:voicePulse .8s ease infinite}@keyframes voicePulse{0%,100%{opacity:1}50%{opacity:.35}}
.adv-toggle-btn{border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.75);background:rgba(255,255,255,.1);transition:all .2s}
.adv-toggle-btn.open{background:#f00;color:#fff}
#header-search{display:flex;align-items:center;justify-content:flex-end}
/* ADV SEARCH */
#adv-bar{background:linear-gradient(90deg,#1a1a1a,#2a0000,#1a1a1a);max-height:0;overflow:hidden;transition:max-height .35s ease;position:sticky;top:127px;z-index:198}
#adv-bar.open{max-height:120px;padding:10px 0;overflow:visible}
#adv-inner{width:100%;padding:0 24px;display:flex;flex-direction:column;gap:7px}
.adv-row{display:flex;align-items:center;gap:8px;width:100%}
.adv-row select,.adv-year{flex:1;min-width:0;height:34px;background:#1e1e1e;color:#fff;border:1px solid #444;border-radius:6px;padding:0 10px;font-family:'Poppins',sans-serif;font-size:11px;outline:none;cursor:pointer}
.adv-row select option{background:#1e1e1e}
.adv-year::placeholder{color:#666}
#adv-discover{flex:1;min-width:0;height:34px;background:linear-gradient(135deg,#f00,#c00);color:#fff;border:none;border-radius:6px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
/* LANG DROPDOWN */
.lang-wrap{position:relative;flex:1;min-width:0}
.lang-search{width:100%;height:34px;background:#1e1e1e;color:#fff;border:1px solid #444;border-radius:6px;padding:0 10px;font-family:'Poppins',sans-serif;font-size:11px;outline:none;cursor:pointer}
.lang-list{position:absolute;top:38px;left:0;right:0;background:#1a1a2a;border:1px solid #444;border-radius:6px;z-index:9999;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.7);display:none}
.lang-list.open{display:block}
.lang-opt{padding:7px 10px;font-size:11px;color:#ccc;cursor:pointer;transition:background .15s}
.lang-opt:hover{background:#2a2a3a;color:#fff}
.lang-opt.selected{background:rgba(255,0,0,.18);color:#f99;font-weight:600}
/* FEATURED */
#featured-wrapper{background:linear-gradient(180deg,#262626,#f00,#262626);padding:20px 0;overflow:hidden}
.featured-post{width:100%;padding:0 8px}
.featured-post h2{color:#fff;font-size:22px;text-transform:uppercase;font-weight:700;letter-spacing:1px;padding-bottom:8px;text-align:center}
.heading-underline{background:#fff;height:1px;max-width:120px;margin:0 auto 18px;position:relative}
.heading-underline::before,.heading-underline::after{background:#fff;content:"";height:1px;left:0;position:absolute;right:0;width:60px;margin:0 auto}
.heading-underline::before{top:-5px}.heading-underline::after{bottom:-5px}
.featured-scroller{display:flex;overflow-x:scroll;padding:4px 0 10px;cursor:grab;scrollbar-width:none;-ms-overflow-style:none}
.featured-scroller::-webkit-scrollbar{display:none}
.featured-scroller.grabbing{cursor:grabbing}
#feat-track{display:flex;gap:10px;user-select:none}
.feat-card{flex-shrink:0;width:140px;border-radius:6px;overflow:hidden;background:#181818;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.feat-card:hover{box-shadow:0 10px 24px rgba(0,0,0,.7)}
.feat-card .thumb-wrap{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:#111}
.feat-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.feat-card:hover .thumb-wrap img{transform:scale(1.05)}
.card-label{position:absolute;top:5px;left:5px;color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;z-index:3}
.card-rating-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.75);color:#f5c518;font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;z-index:3}
.feat-card .card-body{padding:6px 7px 8px}
.feat-card .card-title{font-size:11px;font-weight:700;color:#eee;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feat-card .card-meta{font-size:9px;color:#888;margin-top:2px}
/* GRID */
#outer-wrapper{width:100%;padding:0 8px}
.section-heading{color:#fff;font-size:18px;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin:18px 12px 12px;display:flex;align-items:center;gap:10px}
.section-heading::after{content:'';flex:1;height:1px;background:linear-gradient(to right,#f00,transparent)}
.posts-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:8px}
.post-card{background:#181818;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.post-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,.7);z-index:2}
.post-card .thumb-wrap{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:#111}
.post-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.post-card:hover .thumb-wrap img{transform:scale(1.05)}
.post-card .card-body{padding:8px 8px 10px;flex:1}
.post-card .card-title{font-size:12px;font-weight:700;color:#eee;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.post-card .card-meta{font-size:10px;color:#888;margin-top:4px;display:flex;align-items:center;gap:6px}
.card-rating{color:#f5c518;font-weight:700}
.skeleton{background:linear-gradient(90deg,#1e1e1e 25%,#2a2a2a 50%,#1e1e1e 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-thumb{width:100%;aspect-ratio:2/3}.skel-body{padding:8px;display:flex;flex-direction:column;gap:7px}
.skel-line{height:10px;border-radius:3px;width:90%}.skel-line.short{width:55%;height:9px}
/* SCROLL TOP */
.scroll-top-btn{position:fixed;right:20px;bottom:20px;width:40px;height:40px;border-radius:50%;background:#f00;color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;visibility:hidden;transition:all .3s}
.scroll-top-btn.show{opacity:1;visibility:visible}
/* ADMIN BTN */
.admin-login-btn{position:fixed;left:20px;bottom:20px;width:40px;height:40px;border-radius:50%;background:#333;color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:999;transition:all .3s;box-shadow:0 3px 12px rgba(0,0,0,.6)}
.admin-login-btn:hover{background:#555;transform:scale(1.1)}
.admin-login-btn.admin-on{background:#16a34a}
/* AUTH */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:11000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .22s,visibility .22s}
.auth-overlay.show{opacity:1;visibility:visible}
.auth-box{background:#0f1320;border:1px solid #2a2a3a;border-radius:14px;padding:30px 26px 24px;width:310px;max-width:92vw;position:relative}
.auth-title{font-size:17px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
.auth-sub{font-size:11px;color:#666;text-align:center;margin-bottom:20px}
.auth-input{width:100%;background:#1a1a2a;border:1px solid #2a2a3a;border-radius:8px;padding:11px 14px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;outline:none;margin-bottom:11px;transition:border .2s}
.auth-input:focus{border-color:#f00}.auth-input::placeholder{color:#555}
.auth-submit{width:100%;padding:11px;background:linear-gradient(135deg,#f00,#c00);color:#fff;border:none;border-radius:8px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:2px}
.auth-submit:hover{opacity:.87}.auth-submit:disabled{opacity:.5;cursor:not-allowed}
.auth-close-btn{position:absolute;top:10px;right:12px;background:none;border:none;color:#666;font-size:19px;cursor:pointer}
.auth-close-btn:hover{color:#fff}
.auth-msg{font-size:11.5px;text-align:center;margin-top:9px;min-height:17px}
.auth-msg.err{color:#f55}.auth-msg.ok{color:#22c55e}
.auth-logout-btn{width:100%;padding:10px;background:#1e1e2a;color:#aaa;border:1px solid #333;border-radius:8px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px}
.auth-logout-btn:hover{background:#2a2a3a;color:#fff}
.auth-tabs{display:flex;border-radius:9px;overflow:hidden;border:1px solid #2a2a3a;margin-bottom:18px}
.auth-tab-btn{flex:1;padding:9px;border:none;background:#1a1a2a;color:#666;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.auth-tab-btn.active{background:#f00;color:#fff}
.auth-avatar-ring{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;font-weight:800;color:#fff}
/* AURL */
.aurl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:11001;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .2s,visibility .2s}
.aurl-overlay.show{opacity:1;visibility:visible}
.aurl-box{background:#0d1120;border:1px solid #2a3a55;border-radius:13px;padding:22px 20px 20px;width:380px;max-width:93vw;position:relative}
.aurl-title{font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.aurl-hint{font-size:11px;color:#64748b;margin-bottom:11px;line-height:1.5}
.aurl-input{width:100%;background:#0a0d18;border:1px solid #2a3a55;border-radius:7px;padding:10px 13px;color:#e2e8f0;font-family:'Poppins',sans-serif;font-size:12px;outline:none;margin-bottom:13px}
.aurl-input:focus{border-color:#fbbf24}
.aurl-actions{display:flex;gap:8px}
.aurl-save{flex:1;padding:9px;background:linear-gradient(135deg,#fbbf24,#d97706);color:#111;border:none;border-radius:7px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.aurl-clear{padding:9px 14px;background:#1a0505;color:#f87171;border:1px solid #440000;border-radius:7px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.aurl-close{position:absolute;top:10px;right:12px;background:none;border:none;color:#555;font-size:18px;cursor:pointer}
.aurl-close:hover{color:#fff}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:none;align-items:center;justify-content:center}
.loading-overlay.show{display:flex}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#f00;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* DETAIL */
#detail-view{position:fixed;inset:0;z-index:9000;background:#0b0f1a;overflow-y:auto;overflow-x:hidden;color:#e2e8f0;display:none}
#detail-view.open{display:block}
.dv-top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#060a12;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:10}
.dv-top-title{color:#94a3b8;font-size:13px;font-weight:600;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 16px}
.dv-close-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#cbd5e1;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.dv-close-btn:hover{background:rgba(255,255,255,.22);color:#fff}
#dv-player-section{height:58vh;display:flex;flex-direction:column;background:#060a12;border-bottom:1px solid #1e293b}
#dv-player-wrap{flex:1;min-height:0;width:100%;background:#000;display:none}
#dv-player-wrap iframe{width:100%;height:100%;border:none;display:block}
#dv-player-placeholder{flex:1;min-height:0;width:100%;background:#080d18;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;cursor:pointer}
.dv-placeholder-backdrop{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.3}
.dv-placeholder-inner{position:relative;z-index:2}
.dv-play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,0,0,.2);border:2px solid rgba(255,0,0,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.pt{color:#94a3b8;font-size:16px;font-weight:600;margin-bottom:5px}.ps{color:#475569;font-size:13px}
.player-sources{display:flex;justify-content:center;align-items:center;gap:10px;padding:12px 24px;background:#080d18;border-bottom:1px solid #1e293b;flex-wrap:wrap}
.source-icon{width:42px;height:42px;border-radius:50%;background:rgb(26,30,46);color:#fff;border:1.5px solid rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:14px;font-weight:700;overflow:hidden;position:relative;font-family:'Poppins',sans-serif}
.source-icon:hover{transform:scale(1.05);border-color:rgba(255,255,255,.55)}
.source-icon.active{background:linear-gradient(135deg,#f60,#e00);border-color:rgba(255,255,255,.8);transform:scale(1.1);box-shadow:0 0 20px rgba(242,98,7,.55)}
.source-icon.custom-src{background:linear-gradient(135deg,#1e3a5f,#0f2240);border-color:rgba(96,165,250,.5)}
.source-icon.custom-src.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-color:#60a5fa;box-shadow:0 0 20px rgba(37,99,235,.6)}
.custom-src-wrap{position:relative;display:inline-block}
.custom-src-edit-btn{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-radius:50%;background:#fbbf24;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.5);transition:transform .2s}
.custom-src-edit-btn:hover{background:#f59e0b;transform:scale(1.2)}
.tv-se-bar{display:none;align-items:center;justify-content:center;padding:10px 24px;background:#080d18;border-bottom:1px solid #1e293b}
.tv-se-bar.show{display:flex}
.se-inner{display:flex;align-items:center;gap:5px;background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:7px 14px}
.se-lbl{width:28px;color:#22c55e;font-size:20px;font-weight:900;text-align:center}
.se-total{min-width:26px;padding:0 5px;background:#1e293b;color:#64748b;border-radius:5px;font-size:11px;text-align:center}
.se-num{width:46px;background:#1e293b;border:1.5px solid #334155;color:#e2e8f0;border-radius:6px;text-align:center;font-size:13px;font-family:'Poppins',sans-serif;outline:none}
.se-num:focus{border-color:#f00}
.se-arrows{display:flex;flex-direction:column;gap:1px}
.se-arrow{width:18px;height:14px;background:#1e293b;border:none;color:#94a3b8;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px}
.se-arrow:hover{background:#334155;color:#fff}
.se-divider{width:1px;height:28px;background:rgba(255,255,255,.15);margin:0 8px}
.se-play-btn{height:32px;padding:0 14px;background:linear-gradient(135deg,#f00,#c00);border:none;color:#fff;border-radius:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-left:6px;white-space:nowrap}
.ep-nav-bar{display:none;align-items:center;justify-content:center;gap:10px;padding:6px 20px;background:#060a12;border-bottom:1px solid #1e293b}
.ep-nav-bar.show{display:flex}
.ep-nav-btn{height:28px;padding:0 12px;background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.ep-nav-btn:hover{background:#f00;color:#fff;border-color:#f00}
.ep-nav-now{color:#64748b;font-size:11px;font-weight:600}
#dv-info-section{display:flex;gap:24px;padding:24px 28px 16px;align-items:flex-start}
.dv-poster-wrap{flex-shrink:0;width:120px}
.dv-poster-wrap img{width:100%;height:180px;object-fit:cover;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.6);border:2px solid rgba(255,0,0,.25)}
#dv-info-right{flex:1;min-width:0}
.dv-title{font-size:22px;font-weight:800;margin-bottom:6px;line-height:1.2;color:#f1f5f9}
.dv-meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:12px;font-size:13px}
.dv-genre{color:#f99;font-weight:600}.dv-meta{color:#94a3b8}.dv-dot{color:#475569;font-size:10px}.dv-imdb{color:#fbbf24;font-weight:700}
.dv-action-row{display:flex;gap:6px;margin-top:8px}
.dv-action-row{flex-wrap:nowrap;align-items:center}
.dv-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 11px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;transition:all .2s;letter-spacing:.2px;flex-shrink:0}
.dv-btn:hover{opacity:.85;transform:translateY(-1px)}
.btn-trailer{background:linear-gradient(135deg,#f44,#c00);color:#fff;box-shadow:0 3px 10px rgba(220,38,38,.4)}
.btn-share{width:32px;height:32px;padding:0;border-radius:50%;background:rgba(255,255,255,.1);color:#e2e8f0;border:1px solid rgba(255,255,255,.22)!important;backdrop-filter:blur(8px)}
.btn-download{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;box-shadow:0 3px 10px rgba(22,163,74,.35)}
.btn-download:disabled{opacity:.38;cursor:not-allowed}
.adm-edit-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(251,191,36,.12);border:1.5px solid rgba(251,191,36,.35);border-radius:6px;color:#fbbf24;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
.adm-edit-btn:hover{background:rgba(251,191,36,.25)}
.dv-divider{height:1px;background:linear-gradient(to right,transparent,#1e293b 20%,#1e293b 80%,transparent);margin:8px 28px 16px}
.dv-plot{font-size:14px;line-height:1.8;color:#94a3b8;padding:0 28px 16px}
#dv-cast-section{padding:28px 28px 48px}
#dv-cast-section h2{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:20px}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px}
.cast-card{display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;border-radius:10px;overflow:hidden;background:#111827;transition:transform .22s,box-shadow .22s;border:1px solid rgba(255,255,255,.04)}
.cast-card:hover{transform:translateY(-6px);box-shadow:0 16px 36px rgba(0,0,0,.7)}
.cast-img-wrap{width:100%;aspect-ratio:2/3;overflow:hidden;background:#1e293b}
.cast-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .35s}
.cast-card:hover .cast-img-wrap img{transform:scale(1.07)}
.cast-name{font-size:11px;font-weight:700;color:#e2e8f0;padding:7px 7px 2px;line-height:1.3}
.cast-role{font-size:10px;color:#f99;font-weight:500;padding:0 7px 9px}
/* PERSON VIEW */
#person-view{position:fixed;inset:0;z-index:9500;background:#070d1a;overflow-y:auto;overflow-x:hidden;color:#e2e8f0;display:none}
#person-view.open{display:block}
.person-close-btn{position:fixed;top:16px;right:16px;z-index:9600;width:40px;height:40px;border-radius:50%;background:rgba(15,23,42,.95);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.person-close-btn:hover{background:#ef4444}
.person-hero{display:flex;gap:22px;padding:24px 20px 18px;align-items:flex-start;background:linear-gradient(180deg,rgba(255,0,0,.08),transparent)}
.person-photo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,0,0,.4);flex-shrink:0}
.person-name{font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.person-dept{display:inline-block;background:rgba(255,0,0,.18);color:#f99;border:1px solid rgba(255,0,0,.3);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.person-bio{font-size:13px;line-height:1.75;color:#94a3b8;padding:0 20px 18px}
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:8px}
.people-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;cursor:pointer;transition:background .2s,transform .2s}
.people-card:hover{background:rgba(255,255,255,.09);transform:translateY(-2px)}
.people-card-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,0,0,.35);flex-shrink:0;background:#1e293b}
.people-card-info{min-width:0}
.people-card-name{font-size:13px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.people-card-known{font-size:11px;color:#94a3b8;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person-works-header{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 12px}
.person-works-count{font-size:12px;color:#64748b;font-weight:500}

.person-works{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:14px 20px 40px}
/* RESPONSIVE */
@media(max-width:900px){.posts-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:600px){.posts-grid{grid-template-columns:repeat(3,1fr)}.break-text{display:none}.header-wrapper{display:flex;flex-direction:column;align-items:center;height:auto;padding:14px 16px;gap:10px}.logo-text{height:auto;width:100%;justify-content:center}.menu-nav{height:auto;justify-content:center;flex-wrap:wrap;gap:5px}.menu-nav li a{padding:.4em 1em;font-size:10px}#header-search{width:100%;justify-content:center}.search-box{width:100%}.search-input{width:100%;max-width:100%;padding:0 80px 0 14px}.search-input:focus{width:100%}}
@media(max-width:400px){.posts-grid{grid-template-columns:repeat(2,1fr)}}

@media(max-width:520px){
  .dv-action-row{gap:4px;flex-wrap:nowrap}
  .dv-btn{padding:5px 9px;font-size:10px;gap:3px;letter-spacing:0}
  .btn-share{width:28px;height:28px}
  .dv-btn svg{flex-shrink:0}
}

.cast-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#1e293b}
.cast-no-img svg{opacity:.5}

/* DETAIL TRANSITION OVERLAY */
#detail-transition{position:fixed;inset:0;z-index:9998;background:rgba(10,10,15,.85);opacity:0;pointer-events:none;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);transition:opacity .5s ease,backdrop-filter .6s ease,-webkit-backdrop-filter .6s ease}
#detail-transition.active{opacity:1;backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);pointer-events:all}
#detail-transition.fade-out{opacity:0;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);pointer-events:none;transition:opacity .6s ease,backdrop-filter .7s ease,-webkit-backdrop-filter .7s ease}
#detail-transition .dt-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.dt-spinner{width:52px;height:52px;border-radius:50%;border:3px solid rgba(255,255,255,.12);border-top-color:rgba(255,255,255,.75);border-right-color:rgba(220,38,38,.6);animation:dtSpin 1s linear infinite;opacity:0;transition:opacity .4s ease}
#detail-transition.active .dt-spinner{opacity:1}
@keyframes dtSpin{to{transform:rotate(360deg)}}

function normalizeEmbed(raw){
  const t=(raw||'').trim();if(!t)return'';
  if(/^[a-zA-Z0-9_-]{11}$/.test(t))return`https://www.youtube.com/embed/${t}?autoplay=1`;
  const yt=t.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt)return`https://www.youtube.com/embed/${yt[1]}?autoplay=1`;
  if(/youtube\.com\/embed\//.test(t))return t.includes('autoplay')?t:`${t}${t.includes('?')?'&':'?'}autoplay=1`;
  const gd=t.match(/drive\.google\.com\/file\/d\/([^/?#]+)/);
  if(gd)return`https://drive.google.com/file/d/${gd[1]}/preview`;
  const ar=t.match(/archive\.org\/details\/([^/?#]+)/);
  if(ar)return`https://archive.org/embed/${ar[1]}`;
  return t;
}

  return d.results.map(r=>({...r,contentType:'anime'}));
}

  cache[t]={items:[...c.items,...items.filter(i=>!ids.has(i.id))],lastPage:page};

let carRaf=null,carPaused=false,carDrag=false,carLastTs=null,carDragMoved=false;
function startCarousel(){
  if(carRaf)cancelAnimationFrame(carRaf);
  const sc=$('feat-scroller');
  const SPEED=window.innerWidth<=720?0.04:0.07;
  let dragStartX=0,dragStartScroll=0;
  const tick=ts=>{
    if(carLastTs===null)carLastTs=ts;
    const dt=ts-carLastTs;carLastTs=ts;
    if(!carPaused&&!carDrag){
      sc.scrollLeft+=SPEED*dt;
      const half=sc.scrollWidth/2;
      if(sc.scrollLeft>=half)sc.scrollLeft-=half;
    }
    carRaf=requestAnimationFrame(tick);
  };
  carRaf=requestAnimationFrame(tick);
  sc.onmouseenter=()=>carPaused=true;
  sc.onmouseleave=()=>{if(!carDrag)carPaused=false};
  sc.onmousedown=e=>{carDrag=true;carDragMoved=false;dragStartX=e.pageX;dragStartScroll=sc.scrollLeft;sc.classList.add('grabbing');e.preventDefault()};
  window.onmouseup=()=>{if(!carDrag)return;carDrag=false;sc.classList.remove('grabbing');carPaused=sc.matches(':hover');setTimeout(()=>{carDragMoved=false},0)};
  window.onmousemove=e=>{
    if(!carDrag)return;
    if(Math.abs(e.pageX-dragStartX)>5)carDragMoved=true;
    let n=dragStartScroll-(e.pageX-dragStartX);
    const half=sc.scrollWidth/2;if(n>=half)n-=half;if(n<0)n+=half;
    sc.scrollLeft=n;
  };
}

// ── GRID RENDER ──────────────────────────────────────────────────────────────
function renderGrid(){
  const grid=$('posts-grid');grid.innerHTML='';
  const source=discoverItems||allItems;
  const visible=source.slice(0,displayCount);
  if(!visible.length&&!fetching){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#666">No results found.</div>';return}
  visible.forEach(item=>{
    const div=document.createElement('div');div.className='post-card';
    const rating=item.vote_average?item.vote_average.toFixed(1):'';
    div.innerHTML=`<div class="thumb-wrap"><img src="${imgUrl(item.poster_path)}" alt="" loading="lazy" onerror="this.src='${PH}'"><span class="card-label" style="background:${typeBg(item.contentType)}">${typeLabel(item.contentType)}</span>${rating?`<span class="card-rating-badge">★ ${rating}</span>`:''}</div><div class="card-body"><div class="card-title">${getTitle(item)}</div><div class="card-meta">${getYear(item)?`<span>${getYear(item)}</span>`:''}${rating?`<span class="card-rating">★ ${rating}</span>`:''}</div></div>`;
    div.onclick=()=>triggerDetailTransition(item);
    grid.appendChild(div);
  });
}

// ── INFINITE SCROLL ──────────────────────────────────────────────────────────
const obs=new IntersectionObserver(async entries=>{
  if(!entries[0].isIntersecting||fetching)return;
  const source=discoverItems||allItems;
  if(displayCount<source.length){displayCount=Math.min(displayCount+20,source.length);renderGrid();return}
  if(discoverItems||allItems.length>=500)return;
  fetching=true;$('load-more-spinner').style.display='block';
  const next=lastPage+1;
  try{const ni=await fetchPage(currentTab,next);appendCached(currentTab,ni,next);allItems=getCached(currentTab).items;lastPage=next;displayCount=Math.min(displayCount+20,allItems.length);renderGrid();}catch{}
  fetching=false;$('load-more-spinner').style.display='none';
},{rootMargin:'500px'});
obs.observe($('load-trigger'));

  // ── Parallel: TMDB details + Firebase URLs ──
  const key=`${item.contentType}_${item.id}`;
  let dd=detailCache[key];
  await Promise.all([
    (async()=>{
      if(!dd){
        try{
          const ep=(item.contentType==='tv'||item.contentType==='anime')?`/tv/${item.id}`:`/movie/${item.id}`;
          dd=await tmdb(ep,{append_to_response:'external_ids,videos'});
          detailCache[key]=dd;
        }catch{dd={};}
      }
    })(),
    (async()=>{
      if(urlCache[key]){
        currentDlUrl=urlCache[key].dl||'';currentPlUrl=urlCache[key].pl||'';
      }else{
        await loadUrls(item.contentType,item.id);
        urlCache[key]={dl:currentDlUrl,pl:currentPlUrl};

    })()
  ]);

  // ── Render TMDB data ──
  if(dd.backdrop_path)$('dv-backdrop').src=`${IMG}/w1280${dd.backdrop_path}`;

  let meta='';

  if(seasons)meta+=`<span class="dv-dot">\xb7</span><span class="dv-meta">${seasons} Season${seasons>1?'s':''}</span>`;

  $('dv-meta-row').innerHTML=meta;
  const vids=(dd.videos&&dd.videos.results)||[];
  const tr=vids.find(v=>v.type==='Trailer'&&v.site==='YouTube')||vids.find(v=>v.site==='YouTube');
  trailerKey=tr?tr.key:null;
  if(item.contentType==='tv'||item.contentType==='anime'){
    tvSeasons=(dd.seasons||[]).filter(s=>s.season_number>0);

  }

  // ── Cast (fire-and-forget) ──

  tmdb(credEp).then(c=>{

    $('cast-grid').innerHTML=cast.map(cm=>{const pi='<svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5" width="46" height="46"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';const imgHtml=cm.profile_path?'<img src="'+IMG+'/w185'+cm.profile_path+'" alt="" loading="lazy" class="cast-photo" onerror="castImgFail(this)"><div class="cast-no-img" style="display:none">'+pi+'</div>':'<div class="cast-no-img">'+pi+'</div>';return '<div class="cast-card" onclick="openPerson('+cm.id+')"><div class="cast-img-wrap">'+imgHtml+'</div><div class="cast-name">'+cm.name+'</div><div class="cast-role">'+(cm.character||'')+'</div></div>';}).join('');

      const ct=w.media_type==='movie'?'movie':'tv';
      const r=w.vote_average?w.vote_average.toFixed(1):'';
      const yr=getYear(w)?'<span>'+getYear(w)+'</span>':'';
      const badge=r?'<span class="card-rating-badge">★ '+r+'</span>':'';
      return '<div class="post-card" onclick="closePerson();triggerDetailTransition(window._pw['+i+'])">'+
             '<div class="thumb-wrap"><img src="'+imgUrl(w.poster_path,'w342')+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">'+
             '<span class="card-label" style="background:'+typeBg(ct)+'">'+typeLabel(ct)+'</span>'+badge+'</div>'+
             '<div class="card-body"><div class="card-title">'+getTitle(w)+'</div><div class="card-meta">'+yr+'</div></div></div>';
    }).join('');
  }catch(e){}
  showLoading(false);
}
function closePerson(){$('person-view').classList.remove('open');if(!$('detail-view').classList.contains('open')){document.body.style.overflow='';document.documentElement.style.overflow='';}}
$('person-close-btn').onclick=closePerson;

// ── SKELETON LOADER ──────────────────────────────────────────────────────────
function showSkeletons(){
  $('posts-grid').innerHTML=Array(20).fill(0).map(()=>`<div class="skeleton-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton"></div><div class="skel-line short skeleton"></div></div></div>`).join('');
}


// ── VOICE SEARCH ─────────────────────────────────────────────────────────────
(function(){
  const vBtn=$('voice-search-btn');
  if(!vBtn)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){vBtn.style.display='none';return;}
  const rec=new SR();rec.continuous=false;rec.interimResults=false;rec.lang='en-US';
  rec.onresult=e=>{const t=e.results[0][0].transcript;$('search-input').value=t;vBtn.classList.remove('listening');doSearch();};
  rec.onend=()=>vBtn.classList.remove('listening');
  rec.onerror=()=>vBtn.classList.remove('listening');
  vBtn.onclick=()=>{if(vBtn.classList.contains('listening')){rec.stop();}else{rec.start();vBtn.classList.add('listening');}};
})();

// ── INIT ─────────────────────────────────────────────────────────────────────
showSkeletons();
loadTab(currentTab);
</script>
</html>
