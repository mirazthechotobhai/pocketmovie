  <script type="module">
import { createHotContext } from "/@vite/client";
const hot = createHotContext("/__dummy__runtime-error-plugin");

function sendError(error) {
  if (!(error instanceof Error)) {
    error = new Error("(unknown runtime error)");
  }
  const serialized = {
    message: error.message,
    stack: error.stack,
  };
  hot.send("runtime-error-plugin:error", serialized);
}

// Only notify the parent frame after the server confirms the error passed
// the filter and the overlay will be shown.
hot.on("runtime-error-plugin:notify-parent", () => {
  try {
    window.parent.postMessage({ type: "runtime-error", id: null }, "*");
  } catch (_) {}
});

window.addEventListener("error", (evt) => {
  sendError(evt.error);
});

window.addEventListener("unhandledrejection", (evt) => {
  sendError(evt.reason);
});
</script>

/* TOPBAR */

.social-icons{display:flex;align-items:center;gap:8px}
.social-icons a{color:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .25s;border:1px solid rgba(255,255,255,.18)}

/* HEADER */
#main-header{background:linear-gradient(90deg,#262626,#ff0000,#262626);border-bottom:1px solid #262626;position:sticky;top:42px;z-index:199}
.header-wrapper{width:100%;height:85px;padding:0 24px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center}

.menu-nav{display:flex;align-items:center;height:85px;gap:0}

.search-box{position:relative;display:flex;align-items:center}

.season-tab.active,.season-tab:hover{background:#ff0000;color:#fff;border-color:#ff0000}
.episodes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:7px;max-height:200px;overflow-y:auto;margin-bottom:16px}
.ep-btn{background:#1e293b;color:#94a3b8;font-size:11px;padding:7px 4px;border-radius:4px;cursor:pointer;border:1px solid #334155;transition:all .2s;text-align:center;font-family:inherit}
.ep-btn:hover,.ep-btn.active{background:#ff0000;color:#fff;border-color:#ff0000}
.anime-ep-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.anime-ep-label{font-size:15px;font-weight:700;color:#f1f5f9}
.anime-ep-input{width:70px;background:#1e293b;border:1.5px solid #334155;color:#e2e8f0;border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none;text-align:center}
.anime-ep-play{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#ff0000,#cc0000);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
#dv-cast-section{padding:28px 28px 48px;display:none}
#dv-cast-section h2{font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:20px}
.cast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px}
.cast-card{display:flex;flex-direction:column;align-items:center;text-align:center;cursor:pointer;border-radius:10px;overflow:hidden;background:#111827;transition:transform .22s,box-shadow .22s;border:1px solid rgba(255,255,255,.04)}
.cast-card:hover{transform:translateY(-6px);box-shadow:0 16px 36px rgba(0,0,0,.7)}
.cast-img-wrap{width:100%;aspect-ratio:2/3;overflow:hidden;background:#1e293b}
.cast-img-wrap img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .35s}
.cast-card:hover .cast-img-wrap img{transform:scale(1.07)}
.cast-name{font-size:11px;font-weight:700;color:#e2e8f0;padding:7px 7px 2px;line-height:1.3}
.cast-role{font-size:10px;color:#ff9999;font-weight:500;padding:0 7px 9px}

/* PERSON VIEW */
#person-view{position:fixed;inset:0;z-index:9500;background:#070d1a;overflow-y:auto;overflow-x:hidden;color:#e2e8f0;display:none}
#person-view.open{display:block}
.person-close-btn{position:fixed;top:16px;right:16px;z-index:9600;width:40px;height:40px;border-radius:50%;background:rgba(15,23,42,.95);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.person-close-btn:hover{background:#ef4444}
.person-hero{display:flex;gap:22px;padding:24px 20px 18px;align-items:flex-start;background:linear-gradient(180deg,rgba(255,0,0,.08),transparent)}
.person-photo{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,0,0,.4);flex-shrink:0}
.person-name{font-size:22px;font-weight:800;color:#f1f5f9;margin-bottom:4px}
.person-dept{display:inline-block;background:rgba(255,0,0,.18);color:#ff9999;border:1px solid rgba(255,0,0,.3);padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:10px}
.person-bio{font-size:13px;line-height:1.75;color:#94a3b8;padding:0 20px 18px}
.person-works{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;padding:14px 20px 40px}
.person-work-card{background:#181818;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}
.person-work-card:hover{transform:translateY(-5px);box-shadow:0 12px 28px rgba(0,0,0,.7);z-index:2}
.person-work-card .thumb-wrap{position:relative;width:100%;aspect-ratio:2/3;overflow:hidden;background:#111}
.person-work-card .thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.person-work-card:hover .thumb-wrap img{transform:scale(1.05)}
.person-work-card .card-body{padding:8px 8px 10px;flex:1}
.person-work-card .card-title{font-size:12px;font-weight:700;color:#eee;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.person-work-card .card-meta{font-size:10px;color:#888;margin-top:4px;display:flex;align-items:center;gap:6px}

/* LOADING OVERLAY */
.loading-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;display:none}
.loading-overlay.show{display:flex}
.loading-spinner{width:48px;height:48px;border:4px solid rgba(255,0,0,.2);border-top-color:#ff0000;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESPONSIVE */
@media(max-width:1200px){.posts-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:960px){.posts-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:720px){.breakhead-text{display:none!important}.breakhead{padding:0 8px!important;min-width:38px!important;justify-content:center!important}
  .posts-grid{grid-template-columns:repeat(3,1fr)}
  .header-wrapper{display:flex;flex-direction:column;height:auto;padding:5px 14px 10px;gap:2px;align-items:center}
  .menu-nav li a{height:auto;padding:5px 16px;background:rgba(255,255,255,.08);border-radius:20px}
  .menu-nav li a.active{background:#ff0000}
  .search-input{width:200px}
  #dv-player-section{height:auto}
  #dv-player-wrap,#dv-player-placeholder{aspect-ratio:1/1;height:auto;flex:none}
  #dv-info-section{padding:16px 14px 12px;gap:14px}
  .dv-title{font-size:17px}
  .dv-btn{padding:5px 9px;font-size:10px}
  .btn-share{width:30px;height:30px;padding:0!important;border-radius:50%;flex-shrink:0}
  .share-text{display:none}
  #dv-ep-section{padding:10px 8px 0}
  .se-play-btn{width:30px;height:30px;padding:0!important;border-radius:50%;margin-left:4px;flex-shrink:0}
  .play-text{display:none}
  #adv-inner{padding:0 10px}
}
@media(max-width:480px){
  .posts-grid{grid-template-columns:repeat(2,1fr)}
  .feat-card{width:100px}
}

const $ = id => document.getElementById(id);

function typeBg(t)      { return t==='anime'?'rgba(168,85,247,.9)':t==='tv'?'rgba(59,130,246,.9)':'rgba(255,0,0,.9)'; }

function hideLoading()  { $('loading-overlay').classList.remove('show'); }

// ================================================================
//  API FETCH
// ================================================================
async function tmdb(path, params={}) {
  const q = new URLSearchParams({ api_key: TMDB_KEY });
  Object.entries(params).forEach(([k,v]) => q.set(k, String(v)));
  const r = await fetch(`${API_BASE}${path}?${q}`);
  if (!r.ok) throw new Error(`TMDB ${r.status}: ${path}`);
  return r.json();
}

async function fetchPage(type, page) {
  if (type === 'movie') {
    if (page <= 3) {
      const d = await tmdb('/trending/movie/week', {page});
      return d.results.map(m => ({...m, contentType:'movie'}));
    }
    const d = await tmdb('/movie/popular', {page});
    return d.results.map(m => ({...m, contentType:'movie'}));
  }
  if (type === 'tv') {
    const d = await tmdb('/tv/popular', {page});
    return d.results.map(t => ({...t, contentType:'tv'}));
  }
  // anime
  const d = await tmdb('/discover/tv', {
    with_genres:'16', with_origin_country:'JP',
    sort_by:'popularity.desc', page
  });
  return d.results.map(a => ({...a, contentType:'anime'}));
}

async function fetchAnilist(title) {
  try {
    const r = await fetch('https://graphql.anilist.co', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query:`query($s:String){Media(search:$s,type:ANIME){id}}`, variables:{s:title}})
    });
    const d = await r.json();
    return d?.data?.Media?.id || null;
  } catch { return null; }
}

// ================================================================
//  CACHE
// ================================================================
function getCached(type) {
  try {
    const r = localStorage.getItem(`moview_${type}_v1`);
    return r ? JSON.parse(r) : {items:[], lastPage:0};
  } catch { return {items:[], lastPage:0}; }
}
function setCached(type, data) {
  try { localStorage.setItem(`moview_${type}_v1`, JSON.stringify(data)); } catch {}
}
function appendCached(type, newItems, page) {
  const d = getCached(type);
  const ids = new Set(d.items.map(i => i.id));
  d.items = [...d.items, ...newItems.filter(i => !ids.has(i.id))].slice(0,500);
  d.lastPage = page;
  setCached(type, d);
}
function getCachedDetail(type, id) {
  try {
    const r = localStorage.getItem('moview_detail_v1');
    if (!r) return null;
    const c = JSON.parse(r);
    return c[`${type}-${id}`]?.d || null;
  } catch { return null; }
}
function setCachedDetail(type, id, detail) {
  try {
    const r = localStorage.getItem('moview_detail_v1');
    const c = r ? JSON.parse(r) : {};
    c[`${type}-${id}`] = {d: detail, t: Date.now()};
    const keys = Object.keys(c);
    if (keys.length > 200) {
      keys.sort((a,b) => c[a].t - c[b].t).slice(0, keys.length - 200).forEach(k => delete c[k]);
    }
    localStorage.setItem('moview_detail_v1', JSON.stringify(c));
  } catch {}
}

// ================================================================
//  FEATURED CAROUSEL
// ================================================================
function renderFeatured(items) {
  if (_featRafId) { cancelAnimationFrame(_featRafId); _featRafId = null; }
  if (_featAbort) { _featAbort.abort(); }
  _featAbort = new AbortController();
  const signal = _featAbort.signal;
  featStore = items;
  const scroller = $('feat-scroller');
  const track = $('feat-track');
  const doubled = [...items, ...items];
  track.innerHTML = doubled.map((item, absIdx) => {
    const realIdx = absIdx % items.length;
    const title = getTitle(item), year = getYear(item);
    const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
    return `<div class="feat-card" data-feat-idx="${realIdx}">
      <div class="thumb-wrap">
        <img src="${imgUrl(item.poster_path,'w300')}" alt="" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
        <span class="card-label" style="background:${typeBg(item.contentType)}">${typeLabel(item.contentType)}</span>
        ${rating?`<span class="card-rating-badge">&#9733; ${rating}</span>`:''}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(title)}</div>
        <div class="card-meta">${year}</div>
      </div>
    </div>`;
  }).join('');

  // ── Auto-scroll via rAF ──
  const SPEED = window.innerWidth <= 720 ? 0.04 : 0.07; // px per ms
  let paused = false;
  let isDragging = false;
  let dragMoved = false;
  let dragStartX = 0;
  let dragStartScroll = 0;
  let lastTs = null;

  function tick(ts) {
    if (lastTs === null) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;
    if (!paused && !isDragging) {
      scroller.scrollLeft += SPEED * dt;
      const half = scroller.scrollWidth / 2;
      if (scroller.scrollLeft >= half) scroller.scrollLeft -= half;
    }
    _featRafId = requestAnimationFrame(tick);
  }
  _featRafId = requestAnimationFrame(tick);

  // Hover → pause / resume
  scroller.addEventListener('mouseenter', () => { paused = true; }, { signal });
  scroller.addEventListener('mouseleave', () => { if (!isDragging) paused = false; }, { signal });

  // Drag
  scroller.addEventListener('mousedown', e => {
    isDragging = true;
    dragMoved = false;
    dragStartX = e.pageX;
    dragStartScroll = scroller.scrollLeft;
    scroller.classList.add('grabbing');
    e.preventDefault();
  }, { signal });
  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    scroller.classList.remove('grabbing');
    const over = scroller.matches(':hover');
    paused = over;
  }, { signal });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.pageX - dragStartX;
    if (Math.abs(dx) > 4) dragMoved = true;
    let next = dragStartScroll - dx;
    const half = scroller.scrollWidth / 2;
    if (next >= half) next -= half;
    if (next < 0) next += half;
    scroller.scrollLeft = next;
  }, { signal });

  // Click → open detail (only if no drag)
  track.addEventListener('click', e => {
    if (dragMoved) return;
    const card = e.target.closest('.feat-card');
    if (!card) return;
    const idx = parseInt(card.dataset.featIdx);
    if (!isNaN(idx) && featStore[idx]) openDetail(featStore[idx]);
  }, { signal });
}

async function loadFeatured(type) {
  const cached = getCached(type);
  const src = cached.items.length >= 20 ? cached.items : null;
  if (src) { renderFeatured(src.slice(0,20)); return; }
  try {
    const items = await fetchPage(type, 1);
    renderFeatured(items.slice(0,20));
  } catch {}
}

// ================================================================
//  HTML ESCAPE (safe card rendering)
// ================================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ================================================================
//  GRID RENDERING
// ================================================================
function renderSkeletons(n=20) {
  return Array.from({length:n}, () =>
    `<div class="skeleton-card">
      <div class="skel-thumb skeleton"></div>
      <div class="skel-body">
        <div class="skel-line skeleton"></div>
        <div class="skel-line short skeleton"></div>
      </div>
    </div>`).join('');
}

function renderCard(item, storeIdx) {
  const title = getTitle(item), year = getYear(item);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  return `<div class="post-card" data-item-idx="${storeIdx}">
    <div class="thumb-wrap">
      <img src="${imgUrl(item.poster_path)}" alt="" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
      <span class="card-label" style="background:${typeBg(item.contentType)}">${typeLabel(item.contentType)}</span>
      ${rating?`<span class="card-rating-badge">&#9733; ${rating}</span>`:''}
    </div>
    <div class="card-body">
      <div class="card-title">${escHtml(title)}</div>
      <div class="card-meta">
        ${year?`<span>${year}</span>`:''}
        ${rating?`<span class="card-rating">&#9733; ${rating}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderGrid() {
  const source = discoverItems || currentItems;
  const visible = source.slice(0, displayCount);
  // Store items for safe index-based access
  itemStore = visible;
  $('posts-grid').innerHTML = visible.map((item, i) => renderCard(item, i)).join('');
}

// Click delegation on posts-grid
document.getElementById('posts-grid').addEventListener('click', e => {
  const card = e.target.closest('.post-card');
  if (!card) return;
  const idx = parseInt(card.dataset.itemIdx);
  if (!isNaN(idx) && itemStore[idx]) openDetail(itemStore[idx]);
});

// ================================================================
//  TAB LOADING
// ================================================================
async function loadTab(type) {
  currentTab = type;
  discoverItems = null;
  localStorage.setItem('moview_tab', type);
  displayCount = 20;
  lastPage = 0;

  // Update nav
  document.querySelectorAll('#main-nav a').forEach(a =>
    a.classList.toggle('active', a.dataset.tab === type)
  );

  // Section heading
  const titles = {movie:'Movies', tv:'TV Shows', anime:'Anime'};
  $('section-title').textContent = titles[type] || type;

  // Featured
  loadFeatured(type);

  // Skeletons
  $('posts-grid').innerHTML = renderSkeletons();

  // Cache
  const cached = getCached(type);
  if (cached.items.length >= 60) {
    currentItems = cached.items;
    lastPage = cached.lastPage;
    renderGrid();
    if (cached.items.length < 500) bgLoad(type);
    return;
  }

  // Fetch 3 pages
  try {
    const [p1, p2, p3] = await Promise.all([
      fetchPage(type, 1), fetchPage(type, 2), fetchPage(type, 3)
    ]);
    appendCached(type, [...p1,...p2,...p3], 3);
    currentItems = getCached(type).items;
    lastPage = 3;
    renderGrid();
    bgLoad(type);
  } catch(err) {
    $('posts-grid').innerHTML = `<p style="color:#888;padding:20px;grid-column:1/-1">Failed to load. Check your TMDB API key.<br><small>${err.message}</small></p>`;
  }
}

async function bgLoad(type) {
  const c = getCached(type);
  if (c.items.length >= 500) return;
  let page = c.lastPage + 1;
  while (page <= 25) {
    try {
      const items = await fetchPage(type, page);
      appendCached(type, items, page);
      if (currentTab === type && !discoverItems) currentItems = getCached(type).items;
      page++;
      await new Promise(r => setTimeout(r, 900));
    } catch { break; }
    if (getCached(type).items.length >= 500) break;
  }
}

async function loadMore() {
  if (isFetching) return;
  const source = discoverItems || currentItems;
  if (displayCount < source.length) {
    displayCount = Math.min(displayCount + 20, source.length);
    renderGrid();
    return;
  }
  if (discoverItems || currentItems.length >= 500) return;
  isFetching = true;
  $('spinner').style.display = 'block';
  const nextPage = lastPage + 1;
  try {
    const items = await fetchPage(currentTab, nextPage);
    appendCached(currentTab, items, nextPage);
    currentItems = getCached(currentTab).items;
    lastPage = nextPage;
    displayCount = Math.min(displayCount + 20, currentItems.length);
    renderGrid();
  } catch {}
  $('spinner').style.display = 'none';
  isFetching = false;
}

// ================================================================
//  SEARCH
// ================================================================
async function doSearch() {
  const q = $('search-input').value.trim();
  if (!q) return;
  $('section-title').textContent = `Results: "${q}"`;
  document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
  $('posts-grid').innerHTML = renderSkeletons(12);
  showLoading();
  try {
    const d = await tmdb('/search/multi', {query:q, page:1});
    const results = d.results
      .filter(r => r.media_type === 'movie' || r.media_type === 'tv')
      .map(r => ({...r, contentType: r.media_type === 'movie' ? 'movie' : 'tv'}));
    discoverItems = results;
    displayCount = results.length;
    renderGrid();
    if (!results.length) $('posts-grid').innerHTML = `<p style="color:#888;padding:20px;grid-column:1/-1">No results for "${escHtml(q)}"</p>`;
  } catch { $('posts-grid').innerHTML = `<p style="color:#888;padding:20px">Search failed.</p>`; }
  hideLoading();
}

const MOVIE_GENRES=[{v:'28',l:'Action'},{v:'12',l:'Adventure'},{v:'16',l:'Animation'},{v:'35',l:'Comedy'},{v:'80',l:'Crime'},{v:'99',l:'Documentary'},{v:'18',l:'Drama'},{v:'14',l:'Fantasy'},{v:'27',l:'Horror'},{v:'10749',l:'Romance'},{v:'878',l:'Sci-Fi'},{v:'53',l:'Thriller'}];
const TV_GENRES=[{v:'10759',l:'Action & Adventure'},{v:'16',l:'Animation'},{v:'35',l:'Comedy'},{v:'80',l:'Crime'},{v:'18',l:'Drama'},{v:'14',l:'Fantasy'},{v:'27',l:'Horror'},{v:'10749',l:'Romance'},{v:'10765',l:'Sci-Fi & Fantasy'},{v:'9648',l:'Mystery'}];

function updateAdvGenres() {
  const type = $('adv-type').value;
  const genres = type==='movie' ? MOVIE_GENRES : TV_GENRES;
  $('adv-genre').innerHTML = `<option value="">Any Genre</option>` + genres.map(g=>`<option value="${g.v}">${g.l}</option>`).join('');
}

async function doDiscover() {
  const type  = $('adv-type').value;
  const lang  = $('adv-lang').value;
  const genre = $('adv-genre').value;
  const sort  = $('adv-sort').value;
  const year  = $('adv-year').value;
  const params = {sort_by:sort, page:1};
  if (genre) params.with_genres = genre;
  if (lang)  params.with_original_language = lang;
  if (year)  { type==='movie' ? params.primary_release_year=year : params.first_air_date_year=year; }
  if (type==='anime') { params.with_genres=genre||'16'; params.with_origin_country='JP'; delete params.with_original_language; }
  const endpoint = type==='movie' ? '/discover/movie' : '/discover/tv';
  $('section-title').textContent = 'Discover Results';
  document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
  $('posts-grid').innerHTML = renderSkeletons(12);
  showLoading();
  try {
    const d = await tmdb(endpoint, params);
    const ct = type==='anime'?'anime':type;
    discoverItems = d.results.map(r => ({...r, contentType:ct}));
    displayCount = discoverItems.length;
    loadFeatured(ct);
    renderGrid();
  } catch {}
  hideLoading();
  $('adv-bar').classList.remove('open');
  $('adv-btn').classList.remove('open');
}

//  DETAIL VIEW
// ================================================================
async function openDetail(item) {
  if (!item || !item.id) return;
  currentDetail  = item;
  activeServer   = item.contentType === 'tv' ? 1 : 0;
  playerVisible  = false;
  currentSeason  = 1;
  currentEp      = 1;
  trailerKey     = null;
  anilistId      = null;
  trailerPlaying = false;
  _prevPlayerSrc = '';
  _prevPlayerVisible = false;

  // Lock scroll
  document.body.style.overflow = 'hidden';
  document.documentElement.style.overflow = 'hidden';

  // Show detail view
  const dv = $('detail-view');
  dv.classList.add('open');
  dv.scrollTop = 0;

  const title = getTitle(item);
  $('dv-top-title').textContent = title;
  $('dv-placeholder-title').textContent = title;
  $('dv-title').textContent = title;
  $('dv-plot').textContent = 'Loading...';
  $('dv-meta-row').innerHTML = '';
  $('dv-cast-section').style.display = 'none';
  $('dv-ep-section').style.display = 'none';
  $('custom-url-bar').classList.remove('show');
  $('player-sources').style.display = '';
  $('tv-se-bar').classList.remove('show');
  const sTot=document.getElementById('se-total-s'); if(sTot) sTot.textContent='—';
  const eTot=document.getElementById('se-total-e'); if(eTot) eTot.textContent='—';
  const seInner=document.querySelector('.se-inner'); if(seInner) seInner.classList.remove('anime-ep-only');
  tvSeasonData = [];

  // Reset player
  $('dv-player-placeholder').style.display = 'flex';
  $('ep-nav-bar').classList.remove('show');
  $('dv-player-wrap').style.display = 'none';
  $('dv-iframe').src = '';

  // Poster
  $('dv-poster').src = imgUrl(item.poster_path, 'w300');
  $('dv-poster').onerror = function() { this.src = PLACEHOLDER; };

  // Server buttons
  renderServers(item.contentType);

  showLoading();

  const isTV    = item.contentType === 'tv';
  const isAnime = item.contentType === 'anime';

  // Fetch detail
  let detail = getCachedDetail(item.contentType, item.id);
  if (!detail) {
    try {
      const ep = (isTV || isAnime) ? `/tv/${item.id}` : `/movie/${item.id}`;
      detail = await tmdb(ep, {append_to_response:'external_ids,videos'});
      setCachedDetail(item.contentType, item.id, detail);
    } catch { detail = {}; }
  }

  // Backdrop
  const bdPath = detail.backdrop_path || detail.poster_path;
  const bdEl = $('dv-backdrop');
  if (bdPath) { bdEl.src = `${IMG_BASE}/w1280${bdPath}`; bdEl.style.display='block'; }
  else         { bdEl.style.display='none'; }

  // Meta
  const genres = (detail.genres||[]).map(g=>g.name).join(', ');
  const year   = getYear(item);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
  const runtime= detail.runtime ? `${detail.runtime}m` : '';
  const imdbId = detail.external_ids?.imdb_id || detail.imdb_id || '';
  let meta = [];
  if (genres) meta.push(`<span class="dv-genre">${escHtml(genres)}</span>`);
  if (year)   meta.push(`<span class="dv-dot">·</span><span class="dv-meta">${year}</span>`);
  if (isTV && detail.number_of_seasons) meta.push(`<span class="dv-dot">·</span><span class="dv-meta">${detail.number_of_seasons} Season${detail.number_of_seasons!==1?'s':''}</span>`);
  if (runtime)meta.push(`<span class="dv-dot">·</span><span class="dv-meta">${runtime}</span>`);
  if (rating) meta.push(`<span class="dv-dot">·</span><span class="dv-imdb">&#9733; ${rating}</span>`);
  if (imdbId) meta.push(`<span class="dv-dot">·</span><a href="https://www.imdb.com/title/${imdbId}" target="_blank" style="color:#f5c518;font-weight:700;font-size:13px">IMDb</a>`);
  $('dv-meta-row').innerHTML = meta.join('');
  $('dv-plot').textContent = detail.overview || item.overview || 'No overview available.';
  // Always reset trailer button to "Trailer"
  const _PLAY_SVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  $('btn-trailer').innerHTML = `${_PLAY_SVG} Trailer`;

  // Trailer (video included in append_to_response)
  {
    const vids = (detail.videos?.results || []);
    const t = vids.find(v => v.type==='Trailer' && v.site==='YouTube') || vids.find(v => v.site==='YouTube');
    if (t) { trailerKey=t.key; }
    else if (!isTV && !isAnime) {
      try {
        const tv = await tmdb(`/movie/${item.id}/videos`);
        const found = tv.results.find(v=>v.type==='Trailer'&&v.site==='YouTube');
        if (found) { trailerKey=found.key; }
      } catch {}
    }
  }

  // TV/Anime episodes
  if (isAnime) {
    // Anime: only episode bar, no season UI
    $('dv-ep-section').style.display = 'none';
    $('tv-se-bar').classList.add('show');
    document.querySelector('.se-inner').classList.add('anime-ep-only');
    $('tv-ep-input').value = 1;
    currentEp = 1;
    const rawSeasons = detail.seasons ? detail.seasons.filter(s => s.season_number > 0) : [];
    tvSeasonData = rawSeasons;
    // Set max from total episodes if available
    const totalEps = detail.number_of_episodes || (rawSeasons[0] && rawSeasons[0].episode_count);
    if (totalEps) {
      $('tv-ep-input').max = totalEps;
      const eTot = $('se-total-e'); if(eTot) eTot.textContent = totalEps;
    }
    $('ep-nav-bar').classList.add('show');
    $('ep-nav-now').textContent = 'Ep 1';
    fetchAnilist(title).then(aid => { anilistId = aid; });
  } else if (isTV && detail.seasons) {
    const rawSeasons = detail.seasons.filter(s => s.season_number > 0);
    if (rawSeasons.length) {
      $('dv-ep-section').style.display = 'none';
      $('tv-se-bar').classList.add('show');
      document.querySelector('.se-inner').classList.remove('anime-ep-only');
      $('tv-season-input').value = 1;
      $('tv-ep-input').value = 1;
      currentSeason = 1;
      currentEp = 1;
      tvSeasonData = rawSeasons;
      updateEpHint(1);
      $('ep-nav-bar').classList.add('show');
      $('ep-nav-now').textContent = 'S1 · E1';
    }
  }

  // Cast
  try {
    const ep = (isTV||isAnime) ? `/tv/${item.id}/credits` : `/movie/${item.id}/credits`;
    const credits = await tmdb(ep);
    const cast = (credits.cast||[]).slice(0,20);
    if (cast.length) {
      $('dv-cast-section').style.display = 'block';
      $('cast-grid').innerHTML = cast.map((c,i) =>
        `<div class="cast-card" data-person-id="${c.id}">
          <div class="cast-img-wrap">
            <img src="${c.profile_path?`${IMG_BASE}/w185${c.profile_path}`:AVATAR_PLACEHOLDER}" alt="" loading="lazy" onerror="this.src=AVATAR_PLACEHOLDER">
          </div>
          <div class="cast-name">${escHtml(c.name)}</div>
          <div class="cast-role">${escHtml(c.character||'')}</div>
        </div>`).join('');
    }
  } catch {}

  hideLoading();
}

// Cast click delegation
document.getElementById('cast-grid').addEventListener('click', e => {
  const card = e.target.closest('.cast-card');
  if (!card) return;
  const pid = card.dataset.personId;
  if (pid) openPerson(parseInt(pid));
});

// ================================================================
//  TV EPISODE HINT
// ================================================================
function updateEpHint(seasonNum) {
  const totalSeasons = tvSeasonData.length;
  const seasonInfo = tvSeasonData.find(s => s.season_number === seasonNum);
  const sTot = $('se-total-s');
  const eTot = $('se-total-e');
  if (sTot) sTot.textContent = totalSeasons || '—';
  if (eTot) eTot.textContent = (seasonInfo && seasonInfo.episode_count) ? seasonInfo.episode_count : '—';
  const eInput = $('tv-ep-input');
  if (eInput) eInput.max = (seasonInfo && seasonInfo.episode_count) ? seasonInfo.episode_count : 9999;
}

// ================================================================
//  SERVERS
// ================================================================
function renderServers(type) {
  const isAnime = type === 'anime';
  const container = $('player-sources');
  if (isAnime) {
    container.style.display = 'none';
    window._animeServers = [{label:'1', name:'CinemaOS Live', url:(id,s,e)=>`https://cinemaos.live/animeplayer/watch/${id}/${e}`}];
    return;
  }
  container.style.display = '';
  const servers = type === 'tv' ? TV_SERVERS : MOVIE_SERVERS;
  container.innerHTML = servers.map((s,i) =>
    `<div class="source-icon${i===activeServer?' active':''}" data-srv-idx="${i}" title="${s.name}">
      <span class="btn-num">${s.label}</span>
      <div class="music-viz"><div class="visualizer">${'<div class="bar"></div>'.repeat(7)}</div></div>
    </div>`).join('');
}

// Server click delegation
document.getElementById('player-sources').addEventListener('click', e => {
  const srv = e.target.closest('.source-icon');
  if (!srv) return;
  const i = parseInt(srv.dataset.srvIdx);
  if (isNaN(i)) return;
  activeServer = i;
  document.querySelectorAll('#player-sources .source-icon').forEach((el,idx) =>
    el.classList.toggle('active', idx===i));
  $('custom-url-bar').classList.toggle('show', i===5);
  if (playerVisible && i!==5) watchNow();
});

// ================================================================
//  EPISODES
// ================================================================
function renderSeasons(seasons) {
  $('seasons-tabs').innerHTML = seasons.map(s =>
    `<button class="season-tab${s.season_number===1?' active':''}" data-season="${s.season_number}">S${s.season_number}</button>`).join('');
}

document.getElementById('seasons-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.season-tab');
  if (!btn || !currentDetail) return;
  const season = parseInt(btn.dataset.season);
  document.querySelectorAll('.season-tab').forEach(b => b.classList.toggle('active', parseInt(b.dataset.season)===season));
  loadEpisodes(currentDetail.id, season);
});

async function loadEpisodes(tvId, season) {
  currentSeason = season; currentEp = 1;
  try {
    const d = await tmdb(`/tv/${tvId}/season/${season}`);
    $('episodes-grid').innerHTML = (d.episodes||[]).map(ep =>
      `<button class="ep-btn${ep.episode_number===1?' active':''}" data-ep="${ep.episode_number}">EP ${ep.episode_number}</button>`).join('');
  } catch {}
}

document.getElementById('episodes-grid').addEventListener('click', e => {
  const btn = e.target.closest('.ep-btn');
  if (!btn) return;
  currentEp = parseInt(btn.dataset.ep);
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.ep)===currentEp));
  watchNow();
});

// ================================================================
//  PLAYER
// ================================================================
function getEmbedUrl() {
  const item = currentDetail;
  if (!item) return '';
  const isAnime = item.contentType === 'anime';
  const isTV    = item.contentType === 'tv';
  if (isAnime) {
    const s = parseInt($('tv-season-input').value) || 1;
    const e = parseInt($('tv-ep-input').value) || 1;
    const id = anilistId || item.id;
    const srv = window._animeServers && window._animeServers[activeServer];
    return srv ? srv.url(id, s, e) : `https://cinemaos.live/animeplayer/watch/${id}/${e}`;
  }
  if (activeServer === 5) return $('custom-url-input').value || '';
  if (isTV) {
    const s = parseInt($('tv-season-input').value) || 1;
    const e = parseInt($('tv-ep-input').value) || 1; // default ep 1 if empty
    return TV_SERVERS[activeServer].url(item.id, s, e);
  }
  return MOVIE_SERVERS[activeServer].url(item.id);
}

function watchNow() {
  const url = getEmbedUrl();
  if (!url) return;
  playerVisible = true;
  $('dv-player-placeholder').style.display = 'none';
  $('dv-player-wrap').style.display = 'block';
  $('dv-iframe').src = url;
  // Sync E box and nav bar
  const item = currentDetail;
  if (item && (item.contentType==='tv' || item.contentType==='anime')) {
    const ep = parseInt($('tv-ep-input').value) || 1;
    $('tv-ep-input').value = ep;
    $('ep-nav-bar').classList.add('show');
    const sVal = $('tv-season-input').value || 1;
    $('ep-nav-now').textContent = item.contentType==='anime' ? `Ep ${ep}` : `S${sVal} · E${ep}`;
  } else {
    $('ep-nav-bar').classList.remove('show');
  }
}

function watchTrailer() {
  if (!trailerKey) return;
  const PLAY_SVG = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  if (!trailerPlaying) {
    // Save current player state before switching to trailer
    _prevPlayerSrc     = $('dv-iframe').src;
    _prevPlayerVisible = playerVisible;
    trailerPlaying = true;
    playerVisible  = true;
    $('dv-player-placeholder').style.display = 'none';
    $('dv-player-wrap').style.display = 'block';
    $('dv-iframe').src = `https://www.youtube.com/embed/${trailerKey}?autoplay=1`;
    const ct = currentDetail?.contentType;
    const label = ct === 'tv' ? 'TV Shows' : ct === 'anime' ? 'Anime' : 'Movie';
    $('btn-trailer').innerHTML = `${PLAY_SVG} ${label}`;
  } else {
    // Restore previous player state
    trailerPlaying = false;
    if (_prevPlayerVisible && _prevPlayerSrc) {
      $('dv-iframe').src = _prevPlayerSrc;
      playerVisible = true;
    } else {
      $('dv-iframe').src = '';
      $('dv-player-wrap').style.display = 'none';
      $('dv-player-placeholder').style.display = 'flex';
      playerVisible = false;
    }
    $('btn-trailer').innerHTML = `${PLAY_SVG} Trailer`;
  }
}

function closeDetail() {
  $('detail-view').classList.remove('open');
  $('dv-iframe').src = '';
  playerVisible = false;
  document.body.style.overflow = '';
  document.documentElement.style.overflow = '';
}

// ================================================================
//  PERSON VIEW
// ================================================================
async function openPerson(id) {
  const pv = $('person-view');
  pv.classList.add('open');
  $('person-bio').textContent = 'Loading...';
  $('person-works').innerHTML = '';
  document.body.style.overflow = 'hidden';
  document.documentElement.style.overflow = 'hidden';
  showLoading();
  try {
    const [person, credits] = await Promise.all([
      tmdb(`/person/${id}`),
      tmdb(`/person/${id}/combined_credits`)
    ]);
    $('person-name').textContent = person.name || '';
    $('person-dept').textContent = person.known_for_department || '';
    const dob = [person.birthday, person.place_of_birth].filter(Boolean).join(' · ');
    $('person-dob').textContent = dob;
    const bio = person.biography || '';
    $('person-bio').textContent = bio.length > 800 ? bio.slice(0,800)+'...' : bio || 'No biography available.';
    const photoEl = $('person-photo');
    photoEl.src = person.profile_path ? `${IMG_BASE}/w185${person.profile_path}` : AVATAR_PLACEHOLDER;
    photoEl.style.display='block';
    photoEl.onerror = function() { this.src = AVATAR_PLACEHOLDER; };

    const works = (credits.cast||[]).filter(c=>c.poster_path).slice(0,20);
    const worksStore = works;
    $('person-works').innerHTML = works.map((w,i) => {
      const ct = w.media_type==='movie'?'movie':'tv';
      const title = getTitle(w), year = getYear(w);
      const rating = w.vote_average ? w.vote_average.toFixed(1) : '';
      return `<div class="person-work-card" data-work-idx="${i}">
        <div class="thumb-wrap">
          <img src="${imgUrl(w.poster_path,'w342')}" alt="" loading="lazy" onerror="this.src='${PLACEHOLDER}'">
          <span class="card-label" style="background:${typeBg(ct)}">${typeLabel(ct)}</span>
          ${rating?`<span class="card-rating-badge">&#9733; ${rating}</span>`:''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(title)}</div>
          <div class="card-meta">
            ${year?`<span>${year}</span>`:''}
            ${rating?`<span class="card-rating">&#9733; ${rating}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');

    $('person-works').addEventListener('click', e => {
      const card = e.target.closest('.person-work-card');
      if (!card) return;
      const idx = parseInt(card.dataset.workIdx);
      const w = worksStore[idx];
      if (w) { closePerson(); openDetail({...w, contentType: w.media_type==='movie'?'movie':'tv'}); }
    }, {once:true});
  } catch { $('person-bio').textContent = 'Failed to load person info.'; }
  hideLoading();
}

function closePerson() {
  $('person-view').classList.remove('open');
  if (!$('detail-view').classList.contains('open')) {
    document.body.style.overflow = '';
    document.documentElement.style.overflow = '';
  }
}

// ================================================================
//  VOICE SEARCH
// ================================================================
(function() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  const voiceBtn = $('voice-btn');
  if (!SpeechRec || !voiceBtn) return;
  const rec = new SpeechRec();
  rec.lang = 'en-US';
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  let listening = false;
  voiceBtn.addEventListener('click', () => {
    if (listening) { rec.stop(); return; }
    rec.start();
  });
  rec.onstart = () => { listening = true; voiceBtn.classList.add('listening'); voiceBtn.title = 'Listening...'; };
  rec.onend   = () => { listening = false; voiceBtn.classList.remove('listening'); voiceBtn.title = 'Voice Search'; };
  rec.onresult = e => {
    const text = e.results[0][0].transcript;
    $('search-input').value = text;
    doSearch();
  };
  rec.onerror = () => { listening = false; voiceBtn.classList.remove('listening'); };
})();

// ================================================================
//  EVENT BINDINGS
// ================================================================
$('logo-btn').addEventListener('click', () => { window.scrollTo({top:0,behavior:'smooth'}); loadTab(currentTab); });
$('tab-movie').addEventListener('click', () => { window.scrollTo({top:0,behavior:'smooth'}); loadTab('movie'); });
$('tab-tv').addEventListener('click',   () => { window.scrollTo({top:0,behavior:'smooth'}); loadTab('tv'); });
$('tab-anime').addEventListener('click',() => { window.scrollTo({top:0,behavior:'smooth'}); loadTab('anime'); });

$('search-btn').addEventListener('click', doSearch);
$('search-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

$('adv-btn').addEventListener('click', () => {
  $('adv-bar').classList.toggle('open');
  $('adv-btn').classList.toggle('open');
});
$('adv-type').addEventListener('change', updateAdvGenres);
$('adv-discover').addEventListener('click', doDiscover);

$('dv-close-btn').addEventListener('click', closeDetail);
$('dv-placeholder-inner').addEventListener('click', watchNow);
$('btn-trailer').addEventListener('click', watchTrailer);
$('btn-download').addEventListener('click', () => {
  if (!currentDetail) return;
  const q = encodeURIComponent(getTitle(currentDetail) + ' download');
  window.open(`https://www.google.com/search?q=${q}`, '_blank');
});
$('btn-share').addEventListener('click', () => {
  if (navigator.clipboard) navigator.clipboard.writeText(location.href).catch(()=>{});
});
$('custom-url-play-btn').addEventListener('click', () => {
  if ($('custom-url-input').value) watchNow();
});
$('anime-ep-play').addEventListener('click', watchNow);
$('tv-se-play').addEventListener('click', watchNow);
$('ep-next-btn').addEventListener('click', () => {
  const eInp = $('tv-ep-input');
  const sInp = $('tv-season-input');
  const curEp = parseInt(eInp.value) || 1;
  const maxEp = parseInt(eInp.max) || 9999;
  const isAnimeType = currentDetail && currentDetail.contentType === 'anime';
  if (curEp < maxEp) {
    eInp.value = curEp + 1;
    if (!isAnimeType) updateEpHint(parseInt(sInp.value)||1);
    watchNow();
  } else if (!isAnimeType && tvSeasonData.length) {
    // Last ep of season → move to next season
    const curS = parseInt(sInp.value) || 1;
    const nextS = tvSeasonData.find(s => s.season_number === curS + 1);
    if (nextS) {
      sInp.value = nextS.season_number;
      eInp.value = 1;
      updateEpHint(nextS.season_number);
      watchNow();
    }
  }
});
$('ep-prev-btn').addEventListener('click', () => {
  const inp = $('tv-ep-input');
  const cur = parseInt(inp.value) || 1;
  if (cur > 1) { inp.value = cur - 1; watchNow(); }
});
// Listen for episode change postMessage from embedded players
window.addEventListener('message', e => {
  try {
    const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
    const ep = d.episode || d.ep || d.currentEp || d.episodeNumber;
    if (ep && !isNaN(ep) && currentDetail && (currentDetail.contentType==='tv'||currentDetail.contentType==='anime')) {
      $('tv-ep-input').value = ep;
      $('ep-nav-now').textContent = currentDetail.contentType==='anime' ? `Ep ${ep}` : `S${$('tv-season-input').value||1} · E${ep}`;
    }
  } catch {}
});
$('tv-season-input').addEventListener('input', () => {
  const s = parseInt($('tv-season-input').value);
  if (!isNaN(s)) updateEpHint(s);
});
// S/E arrow buttons
$('s-up').addEventListener('click', () => {
  const inp = $('tv-season-input');
  const max = tvSeasonData.length || 99;
  const v = Math.min((parseInt(inp.value)||0) + 1, max);
  inp.value = v; updateEpHint(v);
});
$('s-down').addEventListener('click', () => {
  const inp = $('tv-season-input');
  const v = Math.max((parseInt(inp.value)||2) - 1, 1);
  inp.value = v; updateEpHint(v);
});
$('e-up').addEventListener('click', () => {
  const inp = $('tv-ep-input');
  const max = parseInt(inp.max) || 9999;
  inp.value = Math.min((parseInt(inp.value)||0) + 1, max);
});
$('e-down').addEventListener('click', () => {
  const inp = $('tv-ep-input');
  const v = Math.max((parseInt(inp.value)||2) - 1, 1);
  inp.value = v;
});

$('custom-url-input').addEventListener('input', () => {
  $('custom-url-play-btn').disabled = !$('custom-url-input').value.trim();
});

$('person-close').addEventListener('click', closePerson);

$('scroll-top-btn').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
window.addEventListener('scroll', () => {
  $('scroll-top-btn').classList.toggle('show', window.scrollY > 300);
});

// Infinite scroll
const loadObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) loadMore();
}, {rootMargin:'500px'});
loadObserver.observe($('load-trigger'));

// ================================================================
//  INIT
// ================================================================
updateAdvGenres();
loadTicker();
loadTab(currentTab);


</script>
